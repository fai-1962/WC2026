
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;font-size:13px;}
.topbar{background:#1a1a2e;color:#fff;padding:.7rem 1rem .5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.topbar-title{font-size:15px;font-weight:700;}
.topbar-sub{font-size:10px;opacity:.6;margin-top:1px;}
.sticky-header{position:sticky;top:0;z-index:1000;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.btn-reset{height:26px;padding:0 10px;font-size:10px;border:1px solid rgba(255,255,255,.3);border-radius:5px;cursor:pointer;background:transparent;color:#fff;}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e0e0e0;overflow-x:auto;}
.tab{padding:10px 14px;font-size:12px;border:none;border-bottom:2.5px solid transparent;cursor:pointer;color:#888;background:transparent;white-space:nowrap;font-weight:500;}
.tab.active{color:#1a1a2e;border-bottom-color:#1a73e8;font-weight:700;}
.view{display:none;padding:12px;}
.view.active{display:block;}
.grp-nav{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;background:#fff;padding:8px 0;}
#subNav{background:#fff;padding:8px 12px;box-shadow:0 2px 6px rgba(0,0,0,.08);}
.grp-btn{min-width:32px;height:28px;padding:0 8px;border:1.5px solid #ddd;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;color:#666;background:#fff;}
.grp-btn.active{color:#fff;border-color:transparent;box-shadow:0 2px 6px rgba(0,0,0,.2);}

/* MATCH CARD */
.match-card{background:#fff;border:1px solid #e0e8f5;border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px rgba(26,115,232,.08);cursor:pointer;transition:transform .15s,box-shadow .15s;}
.match-card:active{transform:scale(.99);}
.match-stadium{background:#e8f0fe;color:#1a3a6e;font-size:9px;font-weight:700;text-align:center;padding:5px 8px;letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid #d0dcf5;}
.match-body{display:flex;align-items:center;padding:14px 12px 10px;gap:8px;}
.match-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0;max-width:calc(50% - 44px);}
.match-flag{width:64px;height:43px;border-radius:8px;overflow:hidden;border:2px solid #e0e0e0;background:#f5f5f5;flex-shrink:0;}
.match-flag img{width:100%;height:100%;object-fit:cover;display:block;}
.match-name{font-size:12px;font-weight:800;color:#1a1a2e;text-align:center;text-transform:uppercase;letter-spacing:.03em;line-height:1.2;word-break:break-word;width:100%;}
.match-center{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;width:88px;}
.vs-badge{background:#1a73e8;color:#fff;font-size:11px;font-weight:900;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.score-row{display:flex;align-items:center;gap:4px;}
.score-inp{width:34px;height:30px;text-align:center;font-size:15px;font-weight:800;border:1.5px solid #c5d8ff;border-radius:7px;background:#f0f5ff;color:#1a1a2e;-moz-appearance:textfield;}
.score-inp::-webkit-outer-spin-button,.score-inp::-webkit-inner-spin-button{-webkit-appearance:none;}
.score-inp:focus{outline:none;border-color:#1a73e8;background:#fff;}
.score-sep{color:#aaa;font-size:14px;font-weight:700;}
.match-footer{background:#f8faff;border-top:1px solid #e8f0fe;padding:7px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;}
.match-dt{font-size:11px;font-weight:600;color:#445;display:flex;gap:12px;align-items:center;}
.match-status{font-size:9px;padding:2px 8px;border-radius:999px;font-weight:600;}
.status-done{background:#e6f9f0;color:#1a7a4a;border:1px solid #b2dfcb;}
.status-pending{background:#f0f0f0;color:#999;border:1px solid #e0e0e0;}
.match-winner .match-name{color:#1a73e8;}
.match-winner .match-flag{border-color:#1a73e8;}

/* STANDINGS */
.legend{display:flex;gap:10px;flex-wrap:wrap;font-size:10px;color:#888;margin-bottom:10px;}
.ld{width:8px;height:8px;border-radius:2px;display:inline-block;}
.stgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;}
.stcard{border:1px solid #e0e0e0;border-radius:10px;overflow:hidden;background:#fff;}
.stcard-hd{padding:5px 8px;font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;gap:4px;}
.compact-table{width:100%;border-collapse:collapse;}
.compact-table th{font-size:9px;color:#888;font-weight:600;padding:4px;text-align:center;border-bottom:1px solid #eee;background:#fafafa;}
.compact-table th:nth-child(2){text-align:left;}
.compact-table td{padding:4px;text-align:center;border-bottom:1px solid #f5f5f5;font-size:10px;}
.compact-table td:nth-child(2){text-align:left;}
.compact-table tr.q1 td{background:rgba(26,115,232,.05);}
.compact-table tr.q3 td{background:rgba(52,168,83,.05);}
.form-dots{display:flex;gap:2px;align-items:center;justify-content:center;}
.fd{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
.fd-w{background:#34a853;}.fd-d{background:#aaa;}.fd-l{background:#ea4335;}.fd-x{background:#e8e8e8;}
.sttable{width:100%;border-collapse:collapse;background:#fff;}
.sttable th{font-size:10px;color:#888;font-weight:600;padding:5px;text-align:center;border-bottom:1px solid #eee;background:#fafafa;}
.sttable th:nth-child(2){text-align:left;}
.sttable td{padding:5px;text-align:center;border-bottom:1px solid #f5f5f5;font-size:11px;}
.sttable tr.q1 td{background:rgba(26,115,232,.05);}
.sttable tr.q3 td{background:rgba(52,168,83,.05);}
.pb{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;font-size:9px;font-weight:700;}
.pb1,.pb2{background:#1a73e8;color:#fff;}.pb3{background:#34a853;color:#fff;}.pb4{background:#eee;color:#888;}
.tc{display:flex;align-items:center;gap:5px;}
.p3card{border:1.5px solid #34a853;border-radius:10px;overflow:hidden;margin-top:14px;}
.p3hd{background:#34a853;padding:6px 10px;font-size:11px;font-weight:700;color:#fff;display:flex;justify-content:space-between;}
.fi{display:inline-block;width:20px;height:13px;object-fit:cover;border-radius:2px;border:1px solid rgba(0,0,0,.08);flex-shrink:0;vertical-align:middle;background:#eee;}
.fi-xs{width:13px;height:9px;border-radius:1px;}
.fi-sm{width:18px;height:12px;}

/* BRACKET */
.bracket-outer{overflow-x:auto;padding:4px 0 16px;}
.bracket-grid{display:flex;align-items:stretch;min-width:1020px;}
.rd-col{display:flex;flex-direction:column;flex:1;min-width:115px;max-width:135px;}
.rd-hd{font-size:9px;font-weight:700;color:#888;text-align:center;padding:0 3px 6px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;}
.rd-matches{display:flex;flex-direction:column;justify-content:space-around;flex:1;}
.brd-m{background:#fff;border:1px solid #e0e0e0;border-radius:6px;overflow:hidden;margin:2px 3px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.brd-t{display:flex;align-items:center;gap:4px;padding:3px 5px;height:24px;}
.brd-t:first-child{border-bottom:1px solid #f0f0f0;}
.brd-t.win{font-weight:700;background:#e8f0fe;}
.brd-sc{width:22px;height:18px;text-align:center;font-size:10px;font-weight:700;border:1px solid #ddd;border-radius:3px;background:#f8f9fa;color:#111;-moz-appearance:textfield;flex-shrink:0;}
.brd-sc::-webkit-outer-spin-button,.brd-sc::-webkit-inner-spin-button{-webkit-appearance:none;}
.brd-sc:focus{outline:none;border-color:#1a73e8;}
.brd-ni{flex:1;height:18px;font-size:9px;border:1px solid #ddd;border-radius:3px;background:#f8f8f8;color:#333;padding:0 3px;min-width:0;}
.brd-ni.af{background:#e8f0fe;border-color:#90b4f0;}
.brd-ni.adv{background:#e6f9f0;border-color:#90d9b0;}
.brd-ni:focus{outline:none;border-color:#1a73e8;}
.center-col-brd{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 6px;min-width:130px;flex:0 0 138px;}
.champ-box{border:2px solid #ffd700;border-radius:12px;padding:12px 8px;text-align:center;background:linear-gradient(135deg,#fffde7,#fff8e1);width:100%;margin-top:6px;}
.champ-inp{width:100%;text-align:center;height:24px;font-size:11px;border:1px solid #ddd;border-radius:5px;background:#fff;color:#111;padding:0 4px;margin-top:4px;}
.qpanel{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:12px;margin-bottom:12px;}
.qprog{height:5px;border-radius:3px;background:#eee;margin:6px 0 10px;overflow:hidden;}
.qbar{height:100%;border-radius:3px;background:#1a73e8;transition:width .4s;}
.qchip{display:inline-flex;align-items:center;gap:3px;padding:3px 7px;border-radius:999px;border:1px solid #ddd;background:#fafafa;font-size:10px;color:#333;margin:2px;}
.qchip.p3c{border-color:#34a853;background:rgba(52,168,83,.06);}
.qchip.pd{opacity:.4;border-style:dashed;}
.qbadge{font-size:8px;padding:1px 3px;border-radius:2px;font-weight:700;}
.btn-fill{height:28px;padding:0 12px;font-size:11px;border:none;border-radius:6px;cursor:pointer;background:#1a73e8;color:#fff;font-weight:600;}
.brd-legend{display:flex;gap:10px;flex-wrap:wrap;font-size:10px;color:#666;margin-bottom:10px;}
.bl-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:2px;}

/* STATS */
.stat-tabs2{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.stab{padding:5px 12px;font-size:11px;border:1px solid #ddd;border-radius:999px;cursor:pointer;color:#888;background:#fff;white-space:nowrap;}
.stab.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e;}
.stat-cards2{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:7px;margin-bottom:14px;}
.sc2{background:#fff;border-radius:8px;padding:10px 12px;border:1px solid #e8e8e8;}
.sv2{font-size:20px;font-weight:700;color:#111;}
.sl2{font-size:9px;color:#888;margin-top:1px;}
.ptable{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e8e8e8;}
.ptable thead{background:#f8f9fa;}
.ptable th{font-size:10px;color:#888;font-weight:600;padding:8px 10px;border-bottom:1px solid #eee;text-align:left;}
.ptable th.c{text-align:center;}
.ptable td{padding:8px 10px;border-bottom:1px solid #f5f5f5;font-size:11px;color:#111;vertical-align:middle;}
.ptable td.c{text-align:center;}
.ptable tr:last-child td{border-bottom:none;}
.ptable tr.pre td{background:#fffde7;}
.bp{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700;margin-left:3px;}
.bp-pre{background:#ff9800;color:#fff;}.bp-user{background:#1a73e8;color:#fff;}
.rtc{display:flex;align-items:center;gap:5px;}
.val-c{font-size:14px;font-weight:700;color:#1a73e8;}
.add-form{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:12px;margin-top:10px;}
.add-form h4{font-size:11px;font-weight:700;color:#444;margin-bottom:8px;}
.add-fields{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end;}
.add-fields input,.add-fields select{height:30px;font-size:11px;border:1px solid #ddd;border-radius:5px;background:#fff;color:#111;padding:0 8px;}
.btn-add{height:30px;padding:0 14px;font-size:11px;border:none;border-radius:5px;cursor:pointer;background:#1a73e8;color:#fff;font-weight:600;}
.sec-title{font-size:12px;font-weight:700;color:#111;margin:12px 0 8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.source-tag{font-size:9px;padding:2px 8px;border-radius:4px;background:#f0f0f0;color:#888;font-weight:400;}
.action-btns{display:flex;gap:3px;justify-content:center;}
.btn-sm{width:22px;height:22px;font-size:11px;border:1px solid #ddd;border-radius:4px;cursor:pointer;background:#f8f9fa;color:#666;padding:0;display:flex;align-items:center;justify-content:center;}

/* ══ MODAL — FIXED untuk mobile ══
   Tidak pakai display toggle + opacity transition yang bermasalah.
   Pakai visibility + opacity saja, dengan pointer-events. */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.55);
  z-index:1000;
  display:flex;          /* selalu flex, TIDAK diubah */
  align-items:flex-end;  /* sheet dari bawah di mobile */
  justify-content:center;
  padding:0;
  visibility:hidden;     /* gunakan visibility, bukan display */
  opacity:0;
  transition:opacity .25s, visibility .25s;
  pointer-events:none;
}
.modal-overlay.open{
  visibility:visible;
  opacity:1;
  pointer-events:auto;
}
@media(min-width:501px){
  .modal-overlay{align-items:center;padding:12px;}
}
.modal{
  background:#fff;
  width:100%;
  max-width:520px;
  max-height:92vh;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  box-shadow:0 -4px 30px rgba(0,0,0,.2);
  border-radius:16px 16px 0 0;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
@media(min-width:501px){
  .modal{border-radius:16px;transform:translateY(30px);}
}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-header{
  background:#1a1a2e;color:#fff;
  padding:14px 16px;
  border-radius:16px 16px 0 0;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:1;
}
.modal-title{font-size:13px;font-weight:700;}
.modal-close{
  width:32px;height:32px;border-radius:50%;
  border:1px solid rgba(255,255,255,.3);
  background:transparent;color:#fff;cursor:pointer;
  font-size:18px;display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
/* drag handle for mobile sheet */
.modal-handle{width:40px;height:4px;border-radius:2px;background:#ddd;margin:8px auto 0;}
.modal-body{padding:16px;}

/* Modal hero simetris */
.modal-hero{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:14px 12px;background:#f8faff;border-radius:10px;border:1px solid #e0e8f5;margin-bottom:12px;}
.modal-team{display:flex;flex-direction:column;align-items:center;gap:6px;}
.modal-flag{width:70px;height:47px;border-radius:8px;overflow:hidden;border:2px solid #e0e0e0;background:#f5f5f5;flex-shrink:0;}
.modal-flag img{width:100%;height:100%;object-fit:cover;display:block;}
.modal-team-name{font-size:11px;font-weight:800;color:#1a1a2e;text-align:center;text-transform:uppercase;letter-spacing:.03em;line-height:1.2;max-width:100px;}
.modal-score-center{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;}
.modal-score-num{font-size:28px;font-weight:900;color:#1a1a2e;line-height:1;white-space:nowrap;}
.modal-score-num span{color:#1a73e8;}
.modal-meta{font-size:9px;color:#aaa;text-align:center;line-height:1.5;}

.ai-btn{width:100%;padding:10px;background:linear-gradient(135deg,#1a73e8,#6c63ff);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.ai-btn:active{opacity:.85;}
.ai-btn:disabled{opacity:.6;cursor:not-allowed;}
.ai-btn .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.stat-section{margin-bottom:14px;}
.stat-section-title{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.stat-section-title::after{content:'';flex:1;height:1px;background:#eee;}
.stat-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.events-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.events-col{background:#f8f9fa;border-radius:8px;padding:8px;}
.events-col-title{font-size:10px;font-weight:700;color:#fff;padding:3px 8px;border-radius:4px;margin-bottom:6px;text-align:center;}
.event-item{display:flex;align-items:center;gap:5px;font-size:10px;padding:3px 0;border-bottom:1px solid #eee;}
.event-item:last-child{border-bottom:none;}
.event-min{font-size:9px;font-weight:700;color:#888;min-width:26px;}
.event-player{flex:1;font-weight:500;}
.lineups-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.lineup-col{background:#f8f9fa;border-radius:8px;padding:8px;}
.lineup-title{font-size:10px;font-weight:700;text-align:center;padding:3px 8px;border-radius:4px;color:#fff;margin-bottom:6px;}
.lineup-player{display:flex;align-items:center;gap:4px;font-size:9px;padding:2px 0;border-bottom:1px solid #f0f0f0;}
.lineup-player:last-child{border-bottom:none;}
.lineup-num{width:14px;font-size:8px;font-weight:700;color:#888;text-align:center;}
.lineup-pos{font-size:8px;color:#bbb;}
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:4px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:8px 16px;border-radius:6px;font-size:11px;z-index:2000;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

@media(max-width:500px){
  .match-flag{width:50px;height:34px;}
  .match-name{font-size:10px;}
  .stgrid{grid-template-columns:1fr 1fr;}
  .events-grid,.lineups-wrap{grid-template-columns:1fr;}
  .modal-flag{width:58px;height:39px;}
  .modal-score-num{font-size:22px;}
}
@media(max-width:360px){.stgrid{grid-template-columns:1fr;}}
</style>

<body>
<div class="sticky-header">
<div class="topbar">
  <div><div class="topbar-title">🏆 FIFA World Cup 2026</div><div class="topbar-sub">Jadwal resmi WIB · Klik match untuk statistik AI ✨</div></div>

      <option value="groq">⚡ Groq (Gratis)</option>

      oninput="saveApiKey(this.value)" autocomplete="off">

      <option value="meta-llama/llama-3.3-70b-instruct:free">Llama 3.3 70B</option>
      <option value="deepseek/deepseek-r1:free">DeepSeek R1</option>
      <option value="google/gemma-3-12b-it:free">Gemma 3 12B</option>
      <option value="qwen/qwen3-8b:free">Qwen3 8B</option>
    </select>
    <select id="groqModelSel" style="height:24px;font-size:10px;border:1px solid rgba(255,255,255,.3);border-radius:4px;background:rgba(255,255,255,.15);color:#fff;padding:0 5px;cursor:pointer;display:none;">
      <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
      <option value="llama-3.1-8b-instant">Llama 3.1 8B (Cepat)</option>
      <option value="gemma2-9b-it">Gemma2 9B</option>
      <option value="deepseek-r1-distill-llama-70b">DeepSeek R1 Distill 70B</option>
    </select>
    <span id="apiStatus" style="font-size:11px;" title="Status API key">⚪</span>
    <span id="syncStatus" style="font-size:11px;cursor:pointer;" title="Status sinkronisasi Firebase">🔥</span>
    <button class="btn-reset" onclick="resetAll()">↺ Reset</button>

// ── CALC ──
function calcSt(gid){
  const grp=GROUPS.find(g=>g.id===gid);
  const ts=grp.teams.map(t=>({...t,mp:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0,form:[]}));
  const tm2={};grp.teams.forEach(t=>{tm2[t.n]=[];});
  gm(gid).forEach((m,i)=>{
    const sc=ST.scores[`${gid}_${i}`];
    if(sc&&sc.h!==''&&sc.a!==''&&sc.h!=null){
      const hi=grp.teams.findIndex(t=>t.n===m.h.n),ai=grp.teams.findIndex(t=>t.n===m.a.n);
      const hg=parseInt(sc.h)||0,ag=parseInt(sc.a)||0;
      ts[hi].mp++;ts[hi].gf+=hg;ts[hi].ga+=ag;ts[hi].gd+=hg-ag;
      ts[ai].mp++;ts[ai].gf+=ag;ts[ai].ga+=hg;ts[ai].gd+=ag-hg;
      if(hg>ag){ts[hi].w++;ts[hi].pts+=3;ts[ai].l++;tm2[m.h.n].push('W');tm2[m.a.n].push('L');}
      else if(hg<ag){ts[ai].w++;ts[ai].pts+=3;ts[hi].l++;tm2[m.h.n].push('L');tm2[m.a.n].push('W');}
      else{ts[hi].d++;ts[hi].pts++;ts[ai].d++;ts[ai].pts++;tm2[m.h.n].push('D');tm2[m.a.n].push('D');}
    }
  });
  ts.forEach(t=>{t.form=tm2[t.n]||[];});
  return ts.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
}
const grpDone=gid=>MU.every((_,i)=>{const sc=ST.scores[`${gid}_${i}`];return sc&&sc.h!==''&&sc.a!=='';});
const doneCount=()=>GROUPS.filter(g=>grpDone(g.id)).length;
function getQual(){const auto=[],p3=[];GROUPS.forEach(g=>{if(!grpDone(g.id))return;const st=calcSt(g.id);auto.push({...st[0],pos:1,grp:g.id,grpColor:g.color});auto.push({...st[1],pos:2,grp:g.id,grpColor:g.color});p3.push({...st[2],pos:3,grp:g.id,grpColor:g.color});});p3.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);return{auto,p3,best8:p3.slice(0,8)};}

const BRACKET_TREE=[['r16',0,'r32',0,1],['r16',1,'r32',2,3],['r16',2,'r32',4,5],['r16',3,'r32',6,7],['r16',4,'r32',8,9],['r16',5,'r32',10,11],['r16',6,'r32',12,13],['r16',7,'r32',14,15],['qf',0,'r16',0,1],['qf',1,'r16',2,3],['qf',2,'r16',4,5],['qf',3,'r16',6,7],['sf',0,'qf',0,1],['sf',1,'qf',2,3],['final',0,'sf',0,1]];
function getMatchWinner(rnd,idx){const k=`${rnd}_${idx}`;const nm=ST.koN[k]||{};const sc=ST.ko[k]||{};if(nm.hn&&nm.an&&sc.h!==''&&sc.a!==''){const h=parseInt(sc.h)||0,a=parseInt(sc.a)||0,ph=parseInt(sc.ph)||0,pa=parseInt(sc.pa)||0;if(h>a)return{n:nm.hn,cc:nm.hcc||gCC(nm.hn)};if(a>h)return{n:nm.an,cc:nm.acc||gCC(nm.an)};if(h===a&&sc.ph!==''&&sc.pa!==''){if(ph>pa)return{n:nm.hn,cc:nm.hcc||gCC(nm.hn)};if(pa>ph)return{n:nm.an,cc:nm.acc||gCC(nm.an)};}}return null;}
function getMatchLoser(rnd,idx){const k=`${rnd}_${idx}`;const nm=ST.koN[k]||{};const sc=ST.ko[k]||{};if(nm.hn&&nm.an&&sc.h!==''&&sc.a!==''){const h=parseInt(sc.h)||0,a=parseInt(sc.a)||0,ph=parseInt(sc.ph)||0,pa=parseInt(sc.pa)||0;if(h>a)return{n:nm.an,cc:nm.acc||gCC(nm.an)};if(a>h)return{n:nm.hn,cc:nm.hcc||gCC(nm.hn)};if(h===a&&sc.ph!==''&&sc.pa!==''){if(ph>pa)return{n:nm.an,cc:nm.acc||gCC(nm.an)};if(pa>ph)return{n:nm.hn,cc:nm.hcc||gCC(nm.hn)};}}return null;}
function propagateWinners(){BRACKET_TREE.forEach(([pR,pI,fR,fA,fB])=>{const wA=getMatchWinner(fR,fA),wB=getMatchWinner(fR,fB);const k=`${pR}_${pI}`;if(!ST.koN[k])ST.koN[k]={hn:'',hcc:'',an:'',acc:'',_auto:true};if(ST.koN[k]._auto!==false){if(wA){ST.koN[k].hn=wA.n;ST.koN[k].hcc=wA.cc;}else{ST.koN[k].hn='';ST.koN[k].hcc='';}if(wB){ST.koN[k].an=wB.n;ST.koN[k].acc=wB.cc;}else{ST.koN[k].an='';ST.koN[k].acc='';}}});const fw=getMatchWinner('final',0);if(fw){ST.ko.champion={name:fw.n,cc:fw.cc,_auto:true};}else{ST.ko.champion={name:'',cc:'',_auto:true};}const lA=getMatchLoser('sf',0),lB=getMatchLoser('sf',1);if(!ST.koN['third_0'])ST.koN['third_0']={hn:'',hcc:'',an:'',acc:'',_auto:true};if(ST.koN['third_0']._auto!==false){if(lA){ST.koN['third_0'].hn=lA.n;ST.koN['third_0'].hcc=lA.cc;}else{ST.koN['third_0'].hn='';ST.koN['third_0'].hcc='';}if(lB){ST.koN['third_0'].an=lB.n;ST.koN['third_0'].acc=lB.cc;}else{ST.koN['third_0'].an='';ST.koN['third_0'].acc='';}}}
function computeKoN(){const{auto,best8}=getQual();if(!auto.length&&!best8.length)return;const q=[...auto.filter(t=>t.pos===1),...auto.filter(t=>t.pos===2),...best8];for(let i=0;i<16;i++){const k=`r32_${i}`,t1=q[i]||null,t2=q[i+16]||null;if(!ST.koN[k]||ST.koN[k]._auto!==false)ST.koN[k]={hn:t1?t1.n:'',hcc:t1?t1.cc:'',an:t2?t2.n:'',acc:t2?t2.cc:'',_auto:true};}propagateWinners();save();}

function doFill(){const{auto,best8}=getQual();const q=[...auto.filter(t=>t.pos===1),...auto.filter(t=>t.pos===2),...best8];for(let i=0;i<16;i++){const k=`r32_${i}`,t1=q[i]||null,t2=q[i+16]||null;ST.koN[k]={hn:t1?t1.n:'',hcc:t1?t1.cc:'',an:t2?t2.n:'',acc:t2?t2.cc:'',_auto:true};}propagateWinners();save();renderBracket();renderQualPanel();toast('✅ Bracket diperbarui!');}
function brdMatch(rnd,idx){const k=`${rnd}_${idx}`,nm=ST.koN[k]||{},sc=ST.ko[k]||{},h=sc.h!==''?parseInt(sc.h):null,a=sc.a!==''?parseInt(sc.a):null,ph=sc.ph!==''?parseInt(sc.ph):null,pa=sc.pa!==''?parseInt(sc.pa):null,penDone=ph!==null&&pa!==null,hw=h!==null&&a!==null&&(h>a||(h===a&&penDone&&ph>pa)),aw=h!==null&&a!==null&&(a>h||(h===a&&penDone&&pa>ph)),isPlayed=h!==null&&a!==null&&((h!==a)||(h===a&&penDone)),isAdv=!isPlayed&&(!ST.koN[k]||ST.koN[k]._auto!==false);return`<div class="brd-m"><div class="brd-t ${hw?'win':''}">${nm.hn&&nm.hcc?fi(nm.hcc,'fi fi-xs'):`<span style="width:13px;height:9px;display:inline-block;flex-shrink:0;"></span>`}<input class="brd-ni ${isAdv&&nm.hn?'adv':''}" value="${nm.hn||''}" placeholder="TBD" onchange="setKoN('${k}','hn',this.value)"><input class="brd-sc" type="number" value="${sc.h||''}" placeholder="-" onchange="setKoSc('${k}','h',this.value)">${h!==null&&a!==null&&h===a&&penDone?`<span style="font-size:9px;color:#888;">(${ph})</span>`:''}</div><div class="brd-t ${aw?'win':''}">${nm.an&&nm.acc?fi(nm.acc,'fi fi-xs'):`<span style="width:13px;height:9px;display:inline-block;flex-shrink:0;"></span>`}<input class="brd-ni ${isAdv&&nm.an?'adv':''}" value="${nm.an||''}" placeholder="TBD" onchange="setKoN('${k}','an',this.value)"><input class="brd-sc" type="number" value="${sc.a||''}" placeholder="-" onchange="setKoSc('${k}','a',this.value)">${h!==null&&a!==null&&h===a&&penDone?`<span style="font-size:9px;color:#888;">(${pa})</span>`:''}</div></div>`;}
function renderBracket(){computeKoN();const champ=ST.ko.champion||{};function makeCol(hd,m,n){return`<div class="rd-col" style="min-width:${n>=8?118:n>=4?106:n>=2?98:88}px;max-width:${n>=8?132:n>=4?120:108}px;flex:1;"><div class="rd-hd">${hd}</div><div class="rd-matches">${m}</div></div>`;}function cL(p){const h=p*2*42;return`<div style="width:14px;flex-shrink:0;position:relative;"><svg width="14" height="100%" style="position:absolute;top:0;left:0;width:100%;height:100%;" viewBox="0 0 14 ${h}" preserveAspectRatio="none">${Array.from({length:p},(_,i)=>{const y1=i*2*42+21,y2=(i*2+1)*42+21,ym=(y1+y2)/2;return`<polyline points="0,${y1} 7,${y1} 7,${y2} 0,${y2}" fill="none" stroke="#b0bec5" stroke-width="1.2"/><line x1="7" y1="${ym}" x2="14" y2="${ym}" stroke="#b0bec5" stroke-width="1.2"/>`;}).join('')}</svg></div>`;}function cR(p){const h=p*2*42;return`<div style="width:14px;flex-shrink:0;position:relative;"><svg width="14" height="100%" style="position:absolute;top:0;left:0;width:100%;height:100%;" viewBox="0 0 14 ${h}" preserveAspectRatio="none">${Array.from({length:p},(_,i)=>{const y1=i*2*42+21,y2=(i*2+1)*42+21,ym=(y1+y2)/2;return`<polyline points="14,${y1} 7,${y1} 7,${y2} 14,${y2}" fill="none" stroke="#b0bec5" stroke-width="1.2"/><line x1="7" y1="${ym}" x2="0" y2="${ym}" stroke="#b0bec5" stroke-width="1.2"/>`;}).join('')}</svg></div>`;}const center=`<div class="center-col-brd"><div class="rd-hd">🏆 Final</div><div style="display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;">${brdMatch('final',0)}<div class="champ-box">${champ.name&&champ.cc?`<img src="https://flagcdn.com/w80/${champ.cc.toLowerCase()}.png" style="width:50px;height:33px;object-fit:cover;border-radius:5px;border:1px solid #ddd;" alt="" onerror="this.style.display='none'">`:`<div style="font-size:28px;line-height:1;">🏆</div>`}<div style="font-size:10px;color:#888;font-weight:700;margin:5px 0 2px;">JUARA DUNIA</div><input class="champ-inp" value="${champ.name||''}" placeholder="Nama j function setKoN(k,f,v){if(!ST.koN[k])ST.koN[k]={};ST.koN[k][f]=v;if(f==='hn')ST.koN[k].hcc=v.trim()?gCC(v)||'':'';if(f==='an')ST.koN[k].acc=v.trim()?gCC(v)||'':'';if((ST.koN[k].hn||'')===''&&(ST.koN[k].an||'')==='')ST.koN[k]._auto=true;else ST.koN[k]._auto=false;save();renderBracket();renderQualPanel();if(ST.ag==='KO')renderKOMatches();}
function setKoSc(k,f,v){if(!ST.ko[k])ST.ko[k]={};ST.ko[k][f]=v;if((f==='h'||f==='a')&&(ST.ko[k].h===''||ST.ko[k].a==='')){ST.ko[k].ph='';ST.ko[k].pa='';}if(ST.matchStats[k])delete ST.matchStats[k];save();propagateWinners();renderBracket();}

// ── API CALLERS ──
async function callGroq(apiKey, prompt){
  const model=(document.getElementById('groqModelSel')?.value)||'llama-3.3-70b-versatile';
  const resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':'Bearer '+apiKey
    },
    body:JSON.stringify({
      model,max_tokens:1800,temperature:0.7,
      messages:[
        {role:'system',content:'You are a football statistics generator. Respond with valid JSON only, no markdown, no explanation.'},
        {role:'user',content:prompt}
      ],
      response_format:{type:'json_object'}
    })
  });
  const data=await resp.json();
  if(!resp.ok||data.error){
    const msg=data.error?.message||`HTTP ${resp.status}`;
    if(resp.status===401) throw new Error('API key Groq tidak valid — cek di console.groq.com/keys');
    if(resp.status===429) throw new Error('Rate limit Groq tercapai — tunggu sebentar atau ganti model');
    throw new Error(msg);
  }
  return data.choices?.[0]?.message?.content||'';
}

async function callOpenRouter(apiKey, prompt){
  const model=(document.getElementById('orModelSel')?.value)||'meta-llama/llama-3.3-70b-instruct:free';
  const resp=await fetch('https://openrouter.ai/api/v1/chat/completions',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':'Bearer '+apiKey,
      'HTTP-Referer':location.origin||'http://localhost:8080',
      'X-Title':'WC2026 Tracker'
    },
    body:JSON.stringify({
      model,max_tokens:1800,temperature:0.7,
      messages:[
        {role:'system',content:'You are a football statistics generator. Respond with valid JSON only, no markdown.'},
        {role:'user',content:prompt}
      ]
    })
  });
  const data=await resp.json();
  if(!resp.ok||data.error){
    const msg=data.error?.message||`HTTP ${resp.status}`;
    if(resp.status===401) throw new Error('API key OpenRouter tidak valid');
    if(resp.status===429) throw new Error('Rate limit — coba ganti model atau tunggu beberapa menit');
    if(resp.status===402) throw new Error('Akun OpenRouter perlu top-up credit');
    throw new Error(msg);
  }
  return data.choices?.[0]?.message?.content||'';
}

async function callAnthropic(apiKey, prompt){
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-6',max_tokens:1500,
      messages:[{role:'user',content:prompt}]
    })
  });
  const data=await resp.json();
  if(!resp.ok||data.error){
    const msg=data.error?.message||`HTTP ${resp.status}`;
    if(resp.status===401) throw new Error('API key Anthropic tidak valid');
    throw new Error(msg);
  }
  return data.content.map(c=>c.text||'').join('').trim();
}

// ── AUTO SYNC STATS ──
function syncStatsFromMatchData(stats, hTeam, aTeam){
  function upsert(type,name,team,delta){
    if(!name||!delta)return;
    const cc=gCC(team);
    if(!ST.players[type])ST.players[type]=[];
    const ex=ST.players[type].findIndex(p=>p.name.toLowerCase()===name.toLowerCase());
    if(ex>=0) ST.players[type][ex].val=(ST.players[type][ex].val||0)+delta;
    else ST.players[type].push({name,team,cc,val:delta,pre:false});
  }
  (stats.events_h||[]).forEach(ev=>{
    if(!ev.player)return;
    if(ev.icon==='⚽') upsert('scorer',ev.player,hTeam,1);
    if(ev.icon==='🟨') upsert('yellow',ev.player,hTeam,1);
    if(ev.icon==='🟥') upsert('red',ev.player,hTeam,1);
    if(ev.detail){const m=ev.detail.match(/[Aa]ssist[:：]\s*(.+)/);if(m)upsert('assist',m[1].trim(),hTeam,1);}
  });
  (stats.events_a||[]).forEach(ev=>{
    if(!ev.player)return;
    if(ev.icon==='⚽') upsert('scorer',ev.player,aTeam,1);
    if(ev.icon==='🟨') upsert('yellow',ev.player,aTeam,1);
    if(ev.icon==='🟥') upsert('red',ev.player,aTeam,1);
    if(ev.detail){const m=ev.detail.match(/[Aa]ssist[:：]\s*(.+)/);if(m)upsert('assist',m[1].trim(),aTeam,1);}
  });
  const gkH=(stats.lineup_h||[]).find(p=>p.pos==='GK');
  const gkA=(stats.lineup_a||[]).find(p=>p.pos==='GK');
  if(gkH&&stats.on_target_a>0) upsert('save',gkH.name,hTeam,parseInt(stats.on_target_a)||0);
  if(gkA&&stats.on_target_h>0) upsert('save',gkA.name,aTeam,parseInt(stats.on_target_h)||0);
  save();
}

  try{
    let raw='';

          <div style="font-size:9px;color:#aaa;text-align:center;">${m2.sch[0]}<br>${m2.sch[1]} WIB</div>

// Players by team — built from PREFILL + existing players
function getPlayersByTeam(team){
  if(!team) return [];
  const all=new Map();
  // From official squad data
  (SQUADS[team]||[]).forEach(name=>all.set(name,{name,team}));
  // From saved players (add any custom ones not in squad)
  Object.values(ST.players).forEach(arr=>{
    (arr||[]).forEach(p=>{ if(p.team===team) all.set(p.name,{name:p.name,team}); });
  });
  // From AI-generated lineups
  Object.values(ST.matchStats||{}).forEach(stats=>{
    (stats.lineup_h||[]).forEach(p=>{ if(p._team===team) all.set(p.name,{name:p.name,team}); });
    (stats.lineup_a||[]).forEach(p=>{ if(p._team===team) all.set(p.name,{name:p.name,team}); });
  });
  return Array.from(all.values()).sort((a,b)=>a.name.localeCompare(b.name));
}

function renderStats(){const type=STAT_TYPES.find(s=>s.id===ST.ast);const players=(ST.players[ST.ast]||[]).slice().sort((a,b)=>b.val-a.val);const medals=['🥇','🥈','🥉'];let tg=0,tm=0,draws=0,wins=0;const gg={};GROUPS.forEach(g=>{gg[g.id]=0;gm(g.id).forEach((m,i)=>{const sc=ST.scores[`${g.id}_${i}`];if(sc&&sc.h!==''&&sc.a!==''){tm++;const h2=parseInt(sc.h)||0,a2=parseInt(sc.a)||0,tot=h2+a2;tg+=tot;gg[g.id]+=tot;if(h2===a2)draws++;else wins++;}});});const tgr=Object.entries(gg).sort((a,b)=>b[1]-a[1])[0];const gc=tgr&&tgr[1]>0?GROUPS.find(g=>g.id===tgr[0]).color:'#888';let html=`<div class="stat-tabs2">${STAT_TYPES.map(s=>`<button class="stab ${s.id===ST.ast?'active':''}" onclick="setAST('${s.id}')">${s.label}</button>`).join('')}</div><div class="stat-cards2"><div class="sc2"><div class="sv2">${tm}</div><div class="sl2">Laga Selesai</div></div><div class="sc2"><div class="sv2">${tg}</div><div class="sl2">Total Gol</div></div><div class="sc2"><div class="sv2">${tm>0?(tg/tm).toFixed(2):'-'}</div><div class="sl2">Gol/Laga</div></div><div class="sc2"><div class="sv2">${wins}</div><div class="sl2">Menang</div></div><div class="sc2"><div class="sv2">${draws}</div><div class="sl2">Imbang</div></div><div class="sc2"><div class="sv2" style="color:${gc};font-size:16px;">${tgr&&tgr[1]>0?'Grp '+tgr[0]:'-'}</div><div class="sl2">Grup Terproduktif</div></div></div><div class="sec-title">${type.label} <span class="source-tag">📡 Pre-fill: Oddschecker · Jun 2026</span></div><table class="ptable"><thead><tr><th class="c" style="width:28px;">#</th><th>Pemain</th><th>Tim</th><th class="c">${type.col}</th><th class="c" style="width:70px;">Aksi</th></tr></thead><tbody>`;if(!players.length){html+=`<tr><td colspan="5" style="text-align:center;padding:16px;color:#aaa;">Tambah pemain di bawah.</td></tr>`;}else{players.forEach((p,i)=>{const cc=p.cc||gCC(p.team);const isPre=p.pre===true;html+=`<tr class="${isPre?'pre':''}"><td class="c" style="font-size:13px;">${i<3?medals[i]:(i+1)}</td><td><div class="rtc">${cc?fi(cc,'fi fi-sm'):''}<strong>${p.name}</strong><span class="bp ${isPre?'bp-pre':'bp-user'}">${isPre?'Favorit':'Input'}</span></div></td><td><div class="rtc">${cc?fi(cc,'fi fi-xs'):''}<span style="font-size:10px;color:#666;">${p.team}</span></div></td><td class="c"><span class="val-c">${p.val}</span></td><td class="c"><div class="action-btns"><button class="btn-sm" onclick="addVal('${ST.ast}',${i},1)">+</button><button class="btn-sm" onclick="addVal('${ST.ast}',${i},-1)">−</button><button class="btn-sm" onclick="rmPlayer('${ST.ast}',${i})" style="color:#e63946;">×</button></div></td></tr>`;});;}
html+=`</tbody></table>

function addVal(type,rank,delta){const sorted=(ST.players[type]||[]).slice().sort((a,b)=>b.val-a.val);const p=sorted[rank];if(!p)return;const orig=ST.players[type].findIndex(x=>x.name===p.name&&x.team===p.team);if(orig>=0){ST.players[type][orig].val=Math.max(0,(ST.players[type][orig].val||0)+delta);save();renderStats();}}
